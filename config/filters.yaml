# ============================================================
# EDIT ME before the first real run — these are placeholders.
# ============================================================
# roles: keywords fuzzy-matched against job titles (rapidfuzz partial_ratio)
# title_threshold: 0-100; lower = looser matching
# locations: case-insensitive substrings matched against the job's location
# experience: not enforced yet (Phase 2 heuristic)

roles:
  - Software Engineer
  - Backend Engineer
  - AI Engineer
  - ML Engineer
  - Data Scientist

title_threshold: 85

locations:
  - India
  - Bengaluru
  - Bangalore
  - Hyderabad

# When true, jobs tagged "Remote" also pass regardless of city (this used to
# be baked into `locations` above, which let remote-US/EU postings leak in).
include_remote: true

experience: 0-2 years

# Only match postings from within this many days. Based on each ATS's own
# posted/updated date; falls through (keeps the job) if that date can't be
# parsed, rather than silently dropping it.
max_days_old: 7

# Optional LLM-written intro on the daily digest (needs OPENROUTER_API_KEY).
ai_digest: false
