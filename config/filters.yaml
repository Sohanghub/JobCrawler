# ============================================================
# EDIT ME before the first real run — these are placeholders.
# ============================================================
# roles: keywords fuzzy-matched against job titles (rapidfuzz partial_ratio)
# title_threshold: 0-100; lower = looser matching
# locations: case-insensitive substrings matched against the job's location
# experience: not enforced yet (Phase 2 heuristic)

roles:
  - Software Engineer
  - Backend Engineer

title_threshold: 85

locations:
  - Remote
  - India
  - Bengaluru
  - Bangalore
  - Hyderabad

experience: 0-2 years

# Cosine-similarity floor for semantic title matching (runs alongside fuzzy
# when sentence-transformers + chromadb are installed). On all-MiniLM-L6-v2,
# engineering titles score ~0.46-0.83 vs "Software Engineer"; non-tech ~0.2-0.4.
semantic_threshold: 0.45

# Optional Claude-written intro on the daily digest (needs ANTHROPIC_API_KEY).
ai_digest: false
