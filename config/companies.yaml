# The registry. Adding a Tier 0 company = one entry here, zero code.
# Tier 1 will add: url + selectors:{...}; Tier 2: xhr:{...} or playwright: true;
# Tier 3: zyte: true. (Phases 2-3.)
# All boards below verified live on 2026-07-11.

