name: weekly-discovery
on:
  schedule:
    - cron: "0 3 * * 0"  # Sundays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Find new candidate companies
        run: python -m jobcrawler.discovery.search
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
      - name: Resolve candidates deterministically
        run: python -m jobcrawler.discovery.resolve probe --notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # LLM inference (resolve infer/collect) and approval stay human-driven:
      # run them locally, review pending_review.yaml, then `resolve approve`.
      - name: Commit discovery state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add config/candidates.yaml config/pending_review.yaml data/jobs.db
          if ! git diff --cached --quiet; then
            git commit -m "weekly discovery $(date -u +%F)"
            git push
          fi
